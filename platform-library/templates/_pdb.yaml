{{- define "platform.pdb" -}}
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: {{ include "platform.capabilities.apiVersionForOrDefault" (list . "PodDisruptionBudget") }}
kind: PodDisruptionBudget
metadata:
  name: {{ include "platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
  {{- $min := .Values.podDisruptionBudget.minAvailable }}
  {{- $max := .Values.podDisruptionBudget.maxUnavailable }}
  {{- if and $min $max }}
  {{- fail "podDisruptionBudget.minAvailable and podDisruptionBudget.maxUnavailable are mutually exclusive: the PodDisruptionBudget API accepts only one. Set exactly one, or neither to accept the default of minAvailable: 1." }}
  {{- end }}
  {{- if $max }}
  maxUnavailable: {{ $max }}
  {{- else }}
  minAvailable: {{ $min | default 1 }}
  {{- end }}
{{- end }}
{{- end }}
