{{- define "platform.cronjob" -}}
{{- if .Values.cronJob.enabled }}
apiVersion: {{ include "platform.capabilities.apiVersionForOrDefault" (list . "CronJob") }}
kind: CronJob
metadata:
  name: {{ include "platform.fullname" . }}-cron
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labelsFor" (dict "ctx" . "component" "cronjob") | nindent 4 }}
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- if .Values.cronJob.annotations }}
  annotations:
    {{- range $k, $v := .Values.cronJob.annotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  {{- end }}
spec:
  schedule: {{ .Values.cronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy | default "Allow" }}
  {{- if .Values.cronJob.successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  {{- end }}
  {{- if .Values.cronJob.failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  {{- end }}
  {{- if .Values.cronJob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ .Values.cronJob.startingDeadlineSeconds }}
  {{- end }}
  suspend: {{ .Values.cronJob.suspend | default false }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "platform.selectorLabelsFor" (dict "ctx" . "component" "cronjob") | nindent 12 }}
            {{- range $k, $v := .Values.commonLabels }}
            {{ $k }}: {{ $v | quote }}
            {{- end }}
            {{- range $k, $v := .Values.cronJob.podLabels }}
            {{ $k }}: {{ $v | quote }}
            {{- end }}
          {{- if .Values.cronJob.podAnnotations }}
          annotations:
            {{- range $k, $v := .Values.cronJob.podAnnotations }}
            {{ $k }}: {{ $v | quote }}
            {{- end }}
          {{- end }}
        spec:
          serviceAccountName: {{ include "platform.serviceAccountName" . }}
          automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
          enableServiceLinks: {{ .Values.enableServiceLinks | default false }}
          restartPolicy: OnFailure
          {{- if .Values.podSecurityContext.enabled }}
          securityContext: {{- omit .Values.podSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- $pullSecrets := list -}}
          {{- range .Values.global.imagePullSecrets }}
            {{- $pullSecrets = append $pullSecrets . -}}
          {{- end }}
          {{- range .Values.image.pullSecrets }}
            {{- $pullSecrets = append $pullSecrets . -}}
          {{- end }}
          {{- /* uniq keeps the first occurrence: global entries stay ahead of image ones */ -}}
          {{- $pullSecrets = $pullSecrets | uniq -}}
          {{- if gt (len $pullSecrets) 0 }}
          imagePullSecrets:
            {{- range $pullSecrets }}
            - name: {{ . }}
            {{- end }}
          {{- end }}
          {{- if .Values.cronJob.initContainers }}
          initContainers: {{- include "platform.hardenContainers" (list . .Values.cronJob.initContainers) | nindent 10 }}
          {{- end }}
          {{- if .Values.cronJob.containers }}
          containers: {{- include "platform.hardenContainers" (list . .Values.cronJob.containers) | nindent 10 }}
          {{- else }}
          containers:
            - name: {{ include "platform.name" . }}-cron
              {{- if .Values.containerSecurityContext.enabled }}
              securityContext: {{- omit .Values.containerSecurityContext "enabled" | toYaml | nindent 16 }}
              {{- end }}
              image: {{ include "platform.image" . }}
              imagePullPolicy: {{ include "platform.imagePullPolicy" . }}
              {{- with .Values.jobs.resources }}
              resources: {{- toYaml . | nindent 16 }}
              {{- end }}
          {{- end }}
          {{- if .Values.cronJob.volumes }}
          volumes: {{- toYaml .Values.cronJob.volumes | nindent 10 }}
          {{- end }}
          {{- if .Values.cronJob.nodeSelector }}
          nodeSelector: {{- toYaml .Values.cronJob.nodeSelector | nindent 10 }}
          {{- end }}
          {{- if .Values.cronJob.tolerations }}
          tolerations: {{- toYaml .Values.cronJob.tolerations | nindent 10 }}
          {{- end }}
{{- end }}
{{- end }}
