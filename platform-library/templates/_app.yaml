{{- define "platform.app" -}}
{{- if .Values.configMap.enabled }}
{{- include "platform.emit" (include "platform.configmap" .) }}
{{- end }}

{{- if and .Values.jobs.preInstall.enabled (or .Values.jobs.preInstall.script .Values.jobs.preInstall.scriptFile) }}
  {{- $job := dict "type" "preinstall" "script" .Values.jobs.preInstall.script "scriptFile" .Values.jobs.preInstall.scriptFile "hookWeight" .Values.jobs.preInstall.hookWeight -}}
  {{- include "platform.emit" (include "platform.configmap.script" (dict "root" . "job" $job)) }}
{{- end }}

{{- if and .Values.jobs.postInstall.enabled (or .Values.jobs.postInstall.script .Values.jobs.postInstall.scriptFile) }}
  {{- $job := dict "type" "postinstall" "script" .Values.jobs.postInstall.script "scriptFile" .Values.jobs.postInstall.scriptFile -}}
  {{- include "platform.emit" (include "platform.configmap.script" (dict "root" . "job" $job)) }}
{{- end }}

{{- if .Values.secret.enabled }}
{{- include "platform.emit" (include "platform.secret" .) }}
{{- end }}

{{- if and .Values.certificate.enabled .Values.tlsSelfSigned.enabled -}}
{{- fail (printf "certificate.enabled and tlsSelfSigned.enabled are both true: both target the Secret %q (certificate.secretName defaults to it), so enabling both collides. Set only one to true — certificate.enabled for cert-manager-issued certificates in production, tlsSelfSigned.enabled for local dev/CI self-signed convenience." (include "platform.tlsSecretName" .)) -}}
{{- end }}

{{- if include "platform.capabilities.gateOpen" (list . "Certificate") }}
{{- include "platform.emit" (include "platform.certificate" .) }}
{{- end }}

{{- if and .Values.ingress.enabled .Values.ingress.secrets }}
{{- include "platform.emit" (include "platform.tls.secrets" .) }}
{{- end }}

{{- if .Values.tlsSelfSigned.enabled }}
{{- include "platform.emit" (include "platform.tls.selfsigned" .) }}
{{- end }}

{{- if include "platform.capabilities.gateOpen" (list . "PeerAuthentication") }}
{{- include "platform.emit" (include "platform.mtls" .) }}
{{- end }}

{{- if .Values.persistence.enabled }}
{{- include "platform.emit" (include "platform.pvc" .) }}
{{- end }}

{{- include "platform.emit" (include "platform.workload" .) }}

{{- if .Values.autoscaling.enabled }}
{{- include "platform.emit" (include "platform.hpa" .) }}
{{- end }}

{{- if .Values.service.enabled }}
{{- include "platform.emit" (include "platform.service" .) }}
{{- end }}

{{- if include "platform.statefulset.needsManagedHeadless" . }}
{{- include "platform.emit" (include "platform.service.headless" .) }}
{{- end }}

{{- if .Values.ingress.enabled }}
{{- include "platform.emit" (include "platform.ingress" .) }}
{{- end }}

{{- if include "platform.capabilities.gateOpen" (list . "HTTPRoute") }}
{{- include "platform.emit" (include "platform.gatewayApi" .) }}
{{- end }}

{{- if .Values.networkPolicy.enabled }}
{{- include "platform.emit" (include "platform.networkpolicy" .) }}
{{- end }}

{{- if .Values.podDisruptionBudget.enabled }}
{{- include "platform.emit" (include "platform.pdb" .) }}
{{- end }}

{{- if .Values.serviceAccount.create }}
{{- include "platform.emit" (include "platform.serviceAccount" .) }}
{{- end }}

{{- if and .Values.serviceAccount.create .Values.jobs.preInstall.enabled }}
{{- include "platform.emit" (include "platform.serviceAccount.hook" .) }}
{{- end }}

{{- if include "platform.capabilities.gateOpen" (list . "ServiceMonitor") }}
{{- include "platform.emit" (include "platform.servicemonitor" .) }}
{{- end }}

{{- if include "platform.capabilities.gateOpen" (list . "PodMonitor") }}
{{- include "platform.emit" (include "platform.podmonitor" .) }}
{{- end }}

{{- if .Values.cronJob.enabled }}
{{- include "platform.emit" (include "platform.cronjob" .) }}
{{- end }}

{{- if .Values.jobs.preInstall.enabled }}
{{- include "platform.emit" (include "platform.job.preinstall" .) }}
{{- end }}

{{- if .Values.jobs.postInstall.enabled }}
{{- include "platform.emit" (include "platform.job.postinstall" .) }}
{{- end }}
{{- end }}

{{/*
=============================================================================
platform.render — the single public entrypoint a consuming chart includes.
Composes the opinionated "primary app" objects (platform.app) with the
generic capability-gated long-tail (extraObjects) and the raw escape hatch
(extraManifests). A consumer's templates/app.yaml is simply:
  {{ include "platform.render" . }}
=============================================================================
*/}}
{{- define "platform.render" -}}
{{- include "platform.app" . }}
{{- include "platform.extraObjects" . }}
{{- include "platform.extraManifests" . }}
{{- end -}}
