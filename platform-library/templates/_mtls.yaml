{{- define "platform.mtls" -}}
{{- if .Values.mtls.enabled -}}
{{- $principals := .Values.mtls.allowedPrincipals | default list -}}
{{- if empty $principals -}}
{{- if .Values.mtls.allowAllPrincipals -}}
{{- $principals = list "cluster.local/ns/*/sa/*" -}}
{{- else -}}
{{- fail (printf "mtls.enabled=true but mtls.allowedPrincipals is empty. List the SPIFFE principals allowed to call this workload (same-namespace default: \"cluster.local/ns/%s/sa/*\"), or explicitly opt in to allowing every mesh workload with mtls.allowAllPrincipals=true." .Release.Namespace) -}}
{{- end -}}
{{- end -}}
apiVersion: {{ include "platform.capabilities.apiVersionForOrDefault" (list . "PeerAuthentication") }}
kind: PeerAuthentication
metadata:
  name: {{ include "platform.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  mtls:
    mode: {{ .Values.mtls.policy }}
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
---
apiVersion: {{ include "platform.capabilities.apiVersionForOrDefault" (list . "AuthorizationPolicy") }}
kind: AuthorizationPolicy
metadata:
  name: {{ include "platform.fullname" . }}-authz
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "platform.selectorLabels" . | nindent 6 }}
  action: ALLOW
  rules:
  - from:
    - source:
        principals:
        {{- toYaml $principals | nindent 8 }}
{{- end }}
{{- end }}

