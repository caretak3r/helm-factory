{{- define "platform.configmap.script" -}}
{{- $root := .root -}}
{{- $job := .job -}}
{{- if or $job.script $job.scriptFile }}
{{- /*
The pre-install hook Job mounts this ConfigMap, and Helm creates a release's
normal resources only AFTER the pre-install hooks have run — as a normal
resource this ConfigMap would not exist when the hook pod tries to mount it, and
the fresh install would hang until the hook timed out. So it joins the same hook
phase, one weight ahead of the Job that consumes it. The post-install script
ConfigMap needs none of this: post-install hooks run after the normal resources.
*/ -}}
{{- $hookWeight := "" -}}
{{- if eq $job.type "preinstall" -}}
  {{- $hookWeight = include "platform.job.hookWeight" (dict "job" $job "type" $job.type) -}}
{{- end -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "platform.fullname" $root }}-{{ $job.type }}-script
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "platform.labelsFor" (dict "ctx" $root "component" (printf "job-%s-script" $job.type)) | nindent 4 }}
    {{- range $k, $v := $root.Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
    {{- with $root.Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if $hookWeight }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "{{ sub $hookWeight 1 }}"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  {{- end }}
data:
  {{- if $job.script }}
  script.sh: |
{{- if kindIs "string" $job.script }}
{{ $job.script | indent 4 }}
{{- else if kindIs "slice" $job.script }}
{{- range $job.script }}
    {{ . }}
{{- end }}
{{- end }}
  {{- else if $job.scriptFile }}
  script.sh: |
{{- $scriptPath := $job.scriptFile }}
{{- $scriptFile := $scriptPath }}
{{- if not (hasPrefix "scripts/" $scriptFile) }}
{{- $scriptFile = printf "scripts/%s" $scriptFile }}
{{- end }}
{{- if $root.Files.Get $scriptFile }}
{{ $root.Files.Get $scriptFile | indent 4 }}
{{- else if $root.Files.Get $scriptPath }}
{{ $root.Files.Get $scriptPath | indent 4 }}
{{- else }}
{{ fail (printf "Script file not found: %s — ensure it exists in the chart's scripts/ directory" $scriptPath) }}
{{- end }}
  {{- end }}
{{- end }}
{{- end }}

