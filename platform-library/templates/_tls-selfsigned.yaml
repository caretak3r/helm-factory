{{- define "platform.tls.selfsigned" -}}
{{- if and .Values.tlsSelfSigned.enabled .Values.ingress.hostname -}}
{{- $secretName := include "platform.tlsSecretName" . -}}
{{- /*
DEV-ONLY convenience. Reuse the existing Secret's certificate material on
upgrades so the CA and private key are NOT rotated on every `helm upgrade`,
unless the cert is within `tlsSelfSigned.renewBeforeDays` of the expiry
recorded at generation time. Helm/sprig cannot parse x509 NotAfter out of the
looked-up cert bytes, so the expiry is stamped separately as the annotation
`platform/tls-not-after` (RFC3339) when the cert is generated, and carried
forward unchanged on every reuse. A legacy Secret with no
`platform/tls-not-after` annotation (pre-rotation-support) is treated as
expired and regenerated once — the annotation it acquires makes every
upgrade after that eligible for the rotation check.
`lookup` returns an empty dict during `helm template` and client-side
`--dry-run` (no cluster connection), so offline renders always fall back to
generating a fresh throwaway certificate — expected and harmless for dev/CI.
`helm upgrade --dry-run=server` and real install/upgrade do perform the
lookup. To force rotation immediately, delete the Secret and upgrade. For
production use the cert-manager `certificate` block instead of tlsSelfSigned.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $hasData := and $existing $existing.data (index $existing.data "tls.crt") (index $existing.data "tls.key") (index $existing.data "ca.crt") -}}
{{- $existingNotAfter := "" -}}
{{- if and $existing $existing.metadata $existing.metadata.annotations (hasKey $existing.metadata.annotations "platform/tls-not-after") -}}
  {{- $existingNotAfter = index $existing.metadata.annotations "platform/tls-not-after" -}}
{{- end -}}
{{- $renewBeforeDays := int .Values.tlsSelfSigned.renewBeforeDays -}}
{{- $canReuse := false -}}
{{- if and $hasData (ne $existingNotAfter "") -}}
  {{- $expiryEpoch := $existingNotAfter | toDate "2006-01-02T15:04:05Z07:00" | unixEpoch -}}
  {{- $renewThresholdEpoch := now | dateModify (printf "%dh" (mul $renewBeforeDays 24)) | unixEpoch -}}
  {{- $canReuse = lt $renewThresholdEpoch $expiryEpoch -}}
{{- end -}}
{{- $crt := "" -}}
{{- $key := "" -}}
{{- $caCrt := "" -}}
{{- $notAfter := "" -}}
{{- if $canReuse -}}
  {{- /* Values from lookup .data are already base64-encoded — do NOT b64enc. */ -}}
  {{- $crt = index $existing.data "tls.crt" -}}
  {{- $key = index $existing.data "tls.key" -}}
  {{- $caCrt = index $existing.data "ca.crt" -}}
  {{- $notAfter = $existingNotAfter -}}
{{- else -}}
  {{- $cn := default .Values.ingress.hostname .Values.tlsSelfSigned.commonName -}}
  {{- $dnsNames := .Values.tlsSelfSigned.dnsNames -}}
  {{- if not $dnsNames }}
    {{- $dnsNames = list .Values.ingress.hostname -}}
  {{- end }}
  {{- $validity := int .Values.tlsSelfSigned.validityDays -}}
  {{- $ca := genCA (printf "%s-ca" (include "platform.fullname" .)) $validity -}}
  {{- $cert := genSignedCert $cn nil $dnsNames $validity $ca -}}
  {{- $crt = $cert.Cert | b64enc -}}
  {{- $key = $cert.Key | b64enc -}}
  {{- $caCrt = $ca.Cert | b64enc -}}
  {{- $notAfter = now | dateModify (printf "%dh" (mul $validity 24)) | date "2006-01-02T15:04:05Z07:00" -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    {{- range $k, $v := .Values.commonLabels }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
  annotations:
    platform/tls-not-after: {{ $notAfter | quote }}
    {{- range $k, $v := .Values.commonAnnotations }}
    {{ $k }}: {{ $v | quote }}
    {{- end }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $crt }}
  tls.key: {{ $key }}
  ca.crt: {{ $caCrt }}
{{- end }}
{{- end }}
