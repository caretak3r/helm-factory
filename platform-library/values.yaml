exports:
  defaults:
    # =============================================================================
    # Platform Library Chart - Default Values
    # =============================================================================
    # These defaults are exported to consumer charts via `import-values: [defaults]`
    # and land at the ROOT of the consumer's values scope. Service teams should NOT
    # modify this file — override fields in the consumer chart's values.yaml.
    # =============================================================================

    # -----------------------------------------------------------------------------
    # Naming Defaults
    # -----------------------------------------------------------------------------
    nameOverride: ""
    fullnameOverride: ""

    # -----------------------------------------------------------------------------
    # Global Configuration
    # -----------------------------------------------------------------------------
    global:
      imageRegistry: ""
      imagePullPolicy: ""
      imagePullSecrets: []
      storageClass: ""

    # -----------------------------------------------------------------------------
    # Workload Type
    # -----------------------------------------------------------------------------
    workload:
      type: Deployment

    # -----------------------------------------------------------------------------
    # Container Image
    # -----------------------------------------------------------------------------
    # Either `digest` (preferred — immutable, e.g. "sha256:<64 hex chars>") or
    # `tag` MUST be set; rendering fails otherwise. There is no `latest`
    # fallback. When both are set, digest wins.
    image:
      registry: docker.io
      repository: ""
      tag: ""
      digest: ""
      pullPolicy: IfNotPresent
      pullSecrets: []

    # -----------------------------------------------------------------------------
    # Replica Configuration
    # -----------------------------------------------------------------------------
    replicaCount: 1
    revisionHistoryLimit: 10
    # Optional rollout-safety field for Deployment/StatefulSet/DaemonSet;
    # unset (0) preserves current behavior (field omitted from the manifest).
    minReadySeconds: 0

    # -----------------------------------------------------------------------------
    # Container Ports
    # -----------------------------------------------------------------------------
    ports:
      - name: http
        containerPort: 8080
        protocol: TCP

    # -----------------------------------------------------------------------------
    # Service
    # -----------------------------------------------------------------------------
    service:
      enabled: false
      type: ClusterIP
      ports:
        - name: http
          port: 80
          targetPort: http
          protocol: TCP
      sessionAffinity: None
      sessionAffinityConfig: {}
      clusterIP: ""
      loadBalancerIP: ""
      loadBalancerSourceRanges: []
      externalTrafficPolicy: Cluster
      annotations: {}

    # -----------------------------------------------------------------------------
    # High Availability
    # -----------------------------------------------------------------------------
    highAvailability:
      enabled: false
      podAntiAffinityPreset: soft
      podAffinityPreset: ""
      nodeAffinityPreset:
        type: ""
        key: ""
        values: []
      topologySpreadConstraints: []

    # -----------------------------------------------------------------------------
    # Horizontal Pod Autoscaler
    # -----------------------------------------------------------------------------
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPU: 80
      targetMemory: ""
      metrics: []
      behavior: {}

    # -----------------------------------------------------------------------------
    # Update Strategy
    # -----------------------------------------------------------------------------
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 25%
        maxUnavailable: 25%

    # -----------------------------------------------------------------------------
    # Pod Disruption Budget
    # -----------------------------------------------------------------------------
    podDisruptionBudget:
      enabled: false
      minAvailable: 1

    # -----------------------------------------------------------------------------
    # Resources
    # -----------------------------------------------------------------------------
    resources: {}

    # -----------------------------------------------------------------------------
    # Probes
    # -----------------------------------------------------------------------------
    startupProbe:
      enabled: false
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 0
      periodSeconds: 10
      timeoutSeconds: 1
      failureThreshold: 30
      successThreshold: 1

    livenessProbe:
      enabled: false
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 1

    readinessProbe:
      enabled: false
      httpGet:
        path: /ready
        port: http
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 1

    # -----------------------------------------------------------------------------
    # Init Containers
    # -----------------------------------------------------------------------------
    initContainers:
      enabled: false
      containers: []

    # -----------------------------------------------------------------------------
    # Sidecars
    # -----------------------------------------------------------------------------
    sidecars:
      enabled: false
      containers: []

    # -----------------------------------------------------------------------------
    # ConfigMap
    # -----------------------------------------------------------------------------
    configMap:
      enabled: false
      mounted: false
      mountPath: /app/config
      subPath: ""
      data: {}
      annotations: {}
      labels: {}

    # -----------------------------------------------------------------------------
    # Secret
    # -----------------------------------------------------------------------------
    # WARNING: data/stringData put secret material into values files and Helm
    # release manifests. Prefer a Secret created out-of-band (External Secrets
    # Operator, Sealed Secrets, SOPS, kubectl) and set existingSecret to its
    # name — the chart then renders NO Secret. Consume it via envVarsSecret or
    # envVars valueFrom. existingSecret is mutually exclusive with
    # data/stringData (rendering fails if both are set).
    secret:
      enabled: false
      existingSecret: ""
      type: Opaque
      data: {}
      stringData: {}
      annotations: {}
      labels: {}

    # -----------------------------------------------------------------------------
    # Environment Variables
    # -----------------------------------------------------------------------------
    envVars: {}
    envVarsConfigMap: ""
    envVarsSecret: ""

    # -----------------------------------------------------------------------------
    # Ingress
    # -----------------------------------------------------------------------------
    ingress:
      enabled: false
      ingressClassName: ""
      hostname: app.local
      path: /
      pathType: ImplementationSpecific
      annotations: {}
      # TLS is opt-in (an enabled default would reference a `<hostname>-tls`
      # Secret that nothing provisions). When enabled with a hostname, the
      # secretName is ingress.existingSecret, else "<hostname>-tls" — provide
      # it via cert-manager (certificate block / issuer annotation),
      # ingress.existingSecret, or ingress.secrets. Serving a hostname without
      # TLS prints an install-time WARNING via NOTES.txt.
      tls: false
      existingSecret: ""
      selfSigned: false
      extraHosts: []
      extraPaths: []
      extraTls: []
      extraRules: []
      secrets: []

    # -----------------------------------------------------------------------------
    # Gateway API (HTTPRoute / GRPCRoute)
    # -----------------------------------------------------------------------------
    gatewayApi:
      enabled: false
      apiVersion: gateway.networking.k8s.io/v1
      hostnames: []
      parentRefs: []
      labels: {}
      annotations: {}
      httpRoute:
        enabled: false
        name: ""
        apiVersion: ""
        hostnames: []
        parentRefs: []
        matches: []
        filters: []
        backendRefs: []
        rules: []
        specOverrides: {}
        labels: {}
        annotations: {}
      grpcRoute:
        enabled: false
        name: ""
        apiVersion: ""
        hostnames: []
        parentRefs: []
        matches: []
        backendRefs: []
        rules: []
        specOverrides: {}
        labels: {}
        annotations: {}

    # -----------------------------------------------------------------------------
    # Certificate (cert-manager)
    # -----------------------------------------------------------------------------
    certificate:
      enabled: false
      issuer: ""
      # ClusterIssuer (default, cluster-scoped) or Issuer (namespaced, for
      # multi-tenant clusters where teams own their own cert-manager Issuer).
      issuerKind: ClusterIssuer
      secretName: ""
      duration: 2160h
      renewBefore: 360h
      dnsNames: []
      ipAddresses: []
      usages:
        - server auth
        - client auth

    # -----------------------------------------------------------------------------
    # mTLS Policy
    # -----------------------------------------------------------------------------
    # Fail-closed: when enabled, allowedPrincipals MUST list the SPIFFE
    # principals allowed to call this workload or rendering fails. Easy
    # same-namespace default:
    #   allowedPrincipals:
    #     - "cluster.local/ns/<your-namespace>/sa/*"
    # Setting allowAllPrincipals: true is an explicit opt-in that renders the
    # wildcard principal "cluster.local/ns/*/sa/*" (mutual TLS with no
    # meaningful authorization). Ignored when allowedPrincipals is non-empty.
    mtls:
      enabled: false
      policy: STRICT
      allowedPrincipals: []
      allowAllPrincipals: false

    # -----------------------------------------------------------------------------
    # Self-Signed TLS (DEV-ONLY)
    # -----------------------------------------------------------------------------
    # Generates a self-signed CA + certificate into the Secret <fullname>-tls.
    # On install/upgrade against a real cluster the existing Secret is looked up
    # and reused, so the CA/key are stable across upgrades, UNLESS the cert is
    # within renewBeforeDays of its recorded expiry (annotation
    # platform/tls-not-after), in which case it is regenerated; under
    # `helm template` / client-side --dry-run the lookup is empty and a fresh
    # throwaway cert is generated on every render. Do NOT use in production —
    # use the cert-manager `certificate` block above instead.
    tlsSelfSigned:
      enabled: false
      commonName: ""
      dnsNames: []
      validityDays: 365
      renewBeforeDays: 30

    # -----------------------------------------------------------------------------
    # Jobs (Helm Hooks)
    # -----------------------------------------------------------------------------
    jobs:
      # Hook-job image. Empty repository/tag/digest inherit from the main
      # `image:` block (digest is inherited only when the repository is the
      # same). The effective image must resolve to a tag or digest, or
      # rendering fails.
      image:
        repository: ""
        tag: ""
        digest: ""
        pullPolicy: IfNotPresent
      backoffLimit: 3
      completions: 1
      parallelism: 1
      restartPolicy: Never
      activeDeadlineSeconds: 300
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      initContainers:
        enabled: false
        containers: []
      sidecars:
        enabled: false
        containers: []
      preInstall:
        enabled: false
        hookWeight: -5
        script: ""
        scriptFile: ""
        command: []
        args: []
        env: []
        volumeMounts: []
        volumes: []
        initContainers:
          enabled: false
          containers: []
        sidecars:
          enabled: false
          containers: []
      postInstall:
        enabled: false
        hookWeight: 5
        script: ""
        scriptFile: ""
        command: []
        args: []
        env: []
        volumeMounts: []
        volumes: []
        initContainers:
          enabled: false
          containers: []
        sidecars:
          enabled: false
          containers: []

    # -----------------------------------------------------------------------------
    # CronJob
    # -----------------------------------------------------------------------------
    cronJob:
      enabled: false
      schedule: "0 * * * *"
      concurrencyPolicy: Allow
      successfulJobsHistoryLimit: 3
      failedJobsHistoryLimit: 1
      startingDeadlineSeconds: 200
      suspend: false
      containers: []
      initContainers: []
      sidecars: []
      volumes: []
      annotations: {}
      podAnnotations: {}
      podLabels: {}
      nodeSelector: {}
      tolerations: []

    # -----------------------------------------------------------------------------
    # Persistence
    # -----------------------------------------------------------------------------
    persistence:
      enabled: false
      mountPath: /data
      subPath: ""
      storageClass: ""
      accessModes:
        - ReadWriteOnce
      size: 8Gi
      existingClaim: ""
      selector: {}
      dataSource: {}
      annotations: {}

    # -----------------------------------------------------------------------------
    # StatefulSet Specific
    # -----------------------------------------------------------------------------
    statefulSet:
      serviceName: ""
      podManagementPolicy: OrderedReady
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          partition: 0
      volumeClaimTemplates: []
      # Unset (both empty) preserves the Kubernetes default of Retain/Retain —
      # PVCs created from volumeClaimTemplates are never auto-deleted. Set to
      # "Delete" to reclaim PVCs on scale-down (whenScaled) or StatefulSet
      # deletion (whenDeleted); valid values: Retain, Delete.
      persistentVolumeClaimRetentionPolicy:
        whenDeleted: ""
        whenScaled: ""

    # -----------------------------------------------------------------------------
    # DaemonSet Specific
    # -----------------------------------------------------------------------------
    daemonSet:
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
      nodeSelector: {}

    # -----------------------------------------------------------------------------
    # Service Account
    # -----------------------------------------------------------------------------
    # A dedicated ServiceAccount is created by default so every app gets its own
    # least-privilege identity. The API token is NOT mounted by default
    # (automountServiceAccountToken: false is rendered on both the ServiceAccount
    # and the pod spec); apps that call the Kubernetes API must opt in.
    serviceAccount:
      create: true
      name: ""
      automountServiceAccountToken: false
      annotations: {}
      labels: {}

    # -----------------------------------------------------------------------------
    # Security Context
    # -----------------------------------------------------------------------------
    # Enabled by default. The zero-config output targets the Pod Security
    # Standards "restricted" profile: runAsNonRoot, no privilege escalation,
    # all capabilities dropped, RuntimeDefault seccomp, read-only root
    # filesystem. Set enabled: false on either block to opt out entirely, or
    # override individual fields (e.g. readOnlyRootFilesystem: false for apps
    # that write to their root filesystem; use extraVolumes/extraVolumeMounts
    # with an emptyDir for scratch space instead where possible).
    # Every key except `enabled` is rendered verbatim into the manifest.
    podSecurityContext:
      enabled: true
      fsGroup: 1001
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    containerSecurityContext:
      enabled: true
      runAsUser: 1001
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      seccompProfile:
        type: RuntimeDefault

    # -----------------------------------------------------------------------------
    # Pod Scheduling
    # -----------------------------------------------------------------------------
    nodeSelector: {}
    tolerations: []
    affinity: {}
    priorityClassName: ""
    schedulerName: ""
    terminationGracePeriodSeconds: 30
    podRestartPolicy: Always
    hostAliases: []
    # Do not inject <SVCNAME>_SERVICE_HOST/_PORT env vars from every Service in
    # the namespace (information leak + env bloat). Set true to restore the
    # legacy Kubernetes behavior.
    enableServiceLinks: false

    # -----------------------------------------------------------------------------
    # Volumes
    # -----------------------------------------------------------------------------
    extraVolumes: []
    extraVolumeMounts: []

    # -----------------------------------------------------------------------------
    # Command/Args Override
    # -----------------------------------------------------------------------------
    command: []
    args: []

    # -----------------------------------------------------------------------------
    # Lifecycle Hooks
    # -----------------------------------------------------------------------------
    lifecycleHooks: {}

    # -----------------------------------------------------------------------------
    # Service Monitor (Prometheus)
    # -----------------------------------------------------------------------------
    serviceMonitor:
      enabled: false
      namespace: ""
      port: http
      path: /metrics
      interval: ""
      scrapeTimeout: ""
      labels: {}
      annotations: {}
      jobLabel: ""
      honorLabels: false
      relabelings: []
      metricRelabelings: []
      selector: {}
      namespaceSelector: {}
      # Optional: scrape scheme ("http"/"https"), Prometheus Operator TLSConfig
      # (for mTLS-scraped targets, e.g. alongside this library's mtls.* feature),
      # and a per-target series cap. All unset by default (no effect on render).
      scheme: ""
      tlsConfig: {}
      sampleLimit: 0

    # -----------------------------------------------------------------------------
    # Pod Monitor (Prometheus)
    # -----------------------------------------------------------------------------
    podMonitor:
      enabled: false
      namespace: ""
      port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      labels: {}
      annotations: {}
      jobLabel: ""
      honorLabels: false
      relabelings: []
      metricRelabelings: []
      selector: {}
      namespaceSelector: {}
      # Optional: scrape scheme ("http"/"https"), Prometheus Operator TLSConfig
      # (for mTLS-scraped targets, e.g. alongside this library's mtls.* feature),
      # and a per-target series cap. All unset by default (no effect on render).
      scheme: ""
      tlsConfig: {}
      sampleLimit: 0

    # -----------------------------------------------------------------------------
    # Network Policy
    # -----------------------------------------------------------------------------
    networkPolicy:
      enabled: false
      policyTypes:
        - Ingress
        - Egress
      podSelector: {}
      ingress: []
      egress: []

    # -----------------------------------------------------------------------------
    # Service Endpoints ConfigMap
    # -----------------------------------------------------------------------------
    serviceEndpoints:
      enabled: false

    # -----------------------------------------------------------------------------
    # Labels and Annotations
    # -----------------------------------------------------------------------------
    commonLabels: {}
    commonAnnotations: {}
    labels: {}
    annotations: {}
    podLabels: {}
    podAnnotations: {}

    # -----------------------------------------------------------------------------
    # Capability negotiation
    # -----------------------------------------------------------------------------
    # Every generator picks the best apiVersion the target cluster serves and
    # skips CRD-backed objects whose API is absent. When rendering without a
    # cluster (helm template / CI), the API discovery set is minimal, so list
    # the group/versions (or group/version/Kind) to force-assume as present.
    # Example:
    #   capabilities:
    #     apiVersions:
    #       - gateway.networking.k8s.io/v1
    #       - cert-manager.io/v1
    capabilities:
      apiVersions: []

    # -----------------------------------------------------------------------------
    # Long-tail Kubernetes objects (tier-2)
    # -----------------------------------------------------------------------------
    # A map of Kind -> list of object specs. Each object is rendered with the
    # negotiated apiVersion, standard labels, and namespace handling, and is
    # skipped when no supported apiVersion is present. Any top-level field on a
    # spec other than name/namespace/labels/annotations/apiVersion/kind is passed
    # through verbatim (rules, subjects, roleRef, spec, data, webhooks, ...).
    # Example:
    #   extraObjects:
    #     Role:
    #       - name: app-reader
    #         rules:
    #           - apiGroups: [""]
    #             resources: ["configmaps"]
    #             verbs: ["get", "list", "watch"]
    # Cluster-scoped Kinds (ClusterRole, ClusterRoleBinding, webhooks, CRDs,
    # PriorityClass, StorageClass, ...) in extraObjects are refused by default:
    # a namespace-scoped app chart granting itself cluster-wide objects should
    # be a deliberate, reviewed decision. Set true to allow them.
    allowClusterScopedExtras: false
    extraObjects: {}

    # -----------------------------------------------------------------------------
    # Raw manifests escape hatch
    # -----------------------------------------------------------------------------
    # A list of fully-formed manifests (maps) or template strings rendered
    # verbatim. Use for anything the library does not model natively.
    extraManifests: []
