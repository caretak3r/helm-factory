name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: lint, render matrix, kubeconform, goldens
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin helm to the version used for local development (Helm 4).
      - name: Install helm
        run: |
          curl -fsSL https://get.helm.sh/helm-v4.2.0-linux-amd64.tar.gz | tar -xz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz | tar -xz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Install check-jsonschema
        run: pipx install check-jsonschema

      - name: shellcheck
        run: shellcheck scripts/*.sh tests/render.sh

      - name: helm lint
        run: helm lint platform-library/

      - name: reference values schema is a valid JSON Schema
        run: check-jsonschema --check-metaschema platform-library/values.schema.reference.json

      - name: lint-library (render matrix, goldens, kubeconform, negative render, image pins)
        run: REQUIRE_KUBECONFORM=1 REQUIRE_CHECK_JSONSCHEMA=1 scripts/lint-library.sh
