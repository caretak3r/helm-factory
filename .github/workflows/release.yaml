name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

jobs:
  release:
    name: gate, package, push to GHCR (OCI)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Tool versions mirror .github/workflows/ci.yaml exactly — keep in sync.
      - name: Install helm
        run: |
          curl -fsSL https://get.helm.sh/helm-v4.2.0-linux-amd64.tar.gz | tar -xz -C /tmp
          sudo install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz | tar -xz -C /tmp kubeconform
          sudo install -m 0755 /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Install check-jsonschema
        run: pipx install check-jsonschema

      - name: Verify tag matches chart version
        run: |
          chart_version="$(awk '$1 == "version:" {print $2}' platform-library/Chart.yaml)"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$chart_version" != "$tag_version" ]]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match platform-library/Chart.yaml version ${chart_version}"
            exit 1
          fi
          echo "Releasing platform ${chart_version}"

      - name: Verify CHANGELOG has an entry for this version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if ! grep -qE "^## \[${tag_version//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${tag_version}]' heading — add a dated entry before tagging"
            exit 1
          fi
          echo "CHANGELOG.md has an entry for ${tag_version}"

      # Full CI gate (mirrors ci.yaml) — a tag never ships unvalidated code.
      - name: shellcheck
        run: shellcheck scripts/*.sh tests/render.sh

      - name: helm lint
        run: helm lint platform-library/

      - name: reference values schema is a valid JSON Schema
        run: check-jsonschema --check-metaschema platform-library/values.schema.reference.json

      - name: lint-library (render matrix, goldens, kubeconform, negative render, image pins)
        run: REQUIRE_KUBECONFORM=1 REQUIRE_CHECK_JSONSCHEMA=1 scripts/lint-library.sh

      - name: Log in to GHCR
        env:
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: helm registry login ghcr.io --username "$GH_ACTOR" --password-stdin <<<"$GH_TOKEN"

      - name: Package and push chart
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          owner="$(tr '[:upper:]' '[:lower:]' <<<"$OWNER")"  # GHCR paths must be lowercase
          helm package platform-library/ --destination dist/
          helm push "dist/platform-${GITHUB_REF_NAME#v}.tgz" "oci://ghcr.io/${owner}/charts"

      # Future work (deliberately out of scope): sign the pushed chart with
      # cosign (keyless OIDC) and attach provenance — see fable5-review.md #14.
