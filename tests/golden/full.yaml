apiVersion: batch/v1
kind: CronJob
metadata:
  name: t-full-cron
  namespace: default
  labels:
    helm.sh/chart: full-0.1.0
    app.kubernetes.io/name: full
    app.kubernetes.io/instance: t
    app.kubernetes.io/component: cronjob
    app.kubernetes.io/version: "0.1.0"
