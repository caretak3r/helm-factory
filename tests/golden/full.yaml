apiVersion: apps/v1
kind: Deployment
metadata:
  name: t-full
  namespace: default
  labels:
    helm.sh/chart: full-0.1.0
    app.kubernetes.io/name: full
    app.kubernetes.io/instance: t
    app.kubernetes.io/component: app
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: full
      app.kubernetes.io/instance: t
      app.kubernetes.io/component: app
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: full
        app.kubernetes.io/instance: t
        app.kubernetes.io/component: app
    spec:
      serviceAccountName: t-full
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: full
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          image: docker.io/example/app:1.2.3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
