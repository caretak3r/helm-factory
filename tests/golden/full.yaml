apiVersion: batch/v1
kind: Job
metadata:
  name: t-full-preinstall
  namespace: default
  labels:
    helm.sh/chart: full-0.1.0
    app.kubernetes.io/name: full
    app.kubernetes.io/instance: t
    app.kubernetes.io/component: preinstall
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: full
        app.kubernetes.io/instance: t
        app.kubernetes.io/component: preinstall
    spec:
      restartPolicy: Never
      serviceAccountName: t-full
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - command:
          - /bin/sh
          - /scripts/script.sh
          image: docker.io/example/app:1.2.3
          imagePullPolicy: IfNotPresent
          name: full-preinstall
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
          - mountPath: /scripts
            name: job-script
            readOnly: true
      volumes:
        - configMap:
            defaultMode: 365
            name: t-full-preinstall-script
          name: job-script
