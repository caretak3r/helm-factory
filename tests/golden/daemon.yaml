---
# Source: daemon/templates/app.yaml
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: t-daemon
  namespace: default
  labels:
    helm.sh/chart: daemon-0.1.0
    app.kubernetes.io/name: daemon
    app.kubernetes.io/instance: t
    app.kubernetes.io/component: app
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: daemon
      app.kubernetes.io/instance: t
      app.kubernetes.io/component: app
  updateStrategy:
    rollingUpdate:
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: daemon
        app.kubernetes.io/instance: t
        app.kubernetes.io/component: app
    spec:
      serviceAccountName: t-daemon
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        fsGroup: 1001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - command:
          - sh
          - -c
          - echo init
          image: docker.io/library/busybox:1.36.1
          imagePullPolicy: IfNotPresent
          name: init-wait
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: daemon
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
          image: docker.io/example/daemon:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
        - command:
          - sh
          - -c
          - sleep infinity
          image: docker.io/library/busybox:1.36.1
          imagePullPolicy: IfNotPresent
          name: metrics-proxy
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            seccompProfile:
              type: RuntimeDefault
        - command:
          - sh
          - -c
          - sleep infinity
          image: docker.io/library/busybox:1.36.1
          imagePullPolicy: IfNotPresent
          name: log-shipper
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            seccompProfile:
              type: RuntimeDefault
      nodeSelector:
        kubernetes.io/os: "linux"
      tolerations:
        - effect: NoSchedule
          key: node-role.kubernetes.io/control-plane
          operator: Exists
      terminationGracePeriodSeconds: 30
      restartPolicy: Always
